services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: chatter
      MYSQL_USER: chatter
      MYSQL_PASSWORD: chatter_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
    ports: ["3307:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: ["redis_data:/data"]
volumes:
  mysql_data:
  redis_data:
